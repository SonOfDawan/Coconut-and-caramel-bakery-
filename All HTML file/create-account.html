<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cocoa and Caramel Bakery</title>
    <link rel="stylesheet" href="../CSS-file/create-account.css">
</head>
<body>
    <div class="create-acc">
        <h3>Create Account</h3>
        <div class="field">
            <label for="username" class="input-label">Username</label>
            <input id="username" class="username" type="text" placeholder="JOHN">
        </div>
        <label for="whatsappnumber">WhatsApp Number</label>
        <input class="whatsappnumber" type="tel" placeholder="+2341567890">
        <label for="password">Password</label>
        <input class="password" type="password" placeholder="********">
        <button type="submit">Create Account</button>
        <h4>Already have an account? <a href="login.html">Login</a></h4>
    </div>
</body>
</html>
