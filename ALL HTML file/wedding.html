<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Cake Collection</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS-file/wedding.css" />
  </head>
  <body>
    <section class="cake-wrapper">
      <!-- LEFT SIDE -->

      <div class="cake-list">
        <h2>Wedding Cake Collection</h2>

        <div class="cake-card active">
          <img src="../IMAGE/Wedding Cake 5.jpg" />

          <div>
            <h3>Elegant Floral Cake</h3>
            <p>Starts at $180</p>
          </div>
        </div>

        <div class="cake-card">
          <img src="../IMAGE/Wedding Cake 6.jpg" />

          <div>
            <h3>Rustic Naked Cake</h3>
            <p>Starts at $150</p>
          </div>
        </div>

        <div class="cake-card">
          <img src="../IMAGE/Wedding Cake 1.jpg" />

          <div>
            <h3>Golden Glam Cake</h3>
            <p>Starts at $220</p>
          </div>
        </div>

        <div class="cake-card">
          <img src="../IMAGE/Wedding Cake 2.jpg" />

          <div>
            <h3>Fairy Tale Castle Cake</h3>
            <p>Starts at $250</p>
          </div>
        </div>
      </div>

      <!-- RIGHT SIDE -->

      <div class="customizer">
        <img
          id="cakeImage"
          class="hero-image"
          src="../IMAGE/Wedding Cake 2.jpg"
        />

        <h1 id="cakeName">Elegant Floral Cake</h1>

        <div class="section">
          <h3>Select Size</h3>

          <div class="sizes">
            <button>6 Inch</button>
            <button>8 Inch</button>
            <button>10 Inch</button>
            <button>12 Inch</button>
          </div>
        </div>

        <div class="section">
          <h3>Choose Flavor</h3>

          <div class="flavors">
            <label><input type="radio" name="flavor" /> Vanilla</label>
            <label><input type="radio" name="flavor" /> Chocolate</label>
            <label><input type="radio" name="flavor" /> Red Velvet</label>
            <label><input type="radio" name="flavor" /> Strawberry</label>
          </div>
        </div>

        <div class="section">
          <h3>Decoration Color</h3>

          <div class="colors">
            <span class="pink"></span>
            <span class="ivory"></span>
            <span class="gold"></span>
            <span class="lavender"></span>
            <span class="sage"></span>
          </div>
        </div>

        <div class="section">
          <h3>Message</h3>

          <input type="text" placeholder="Happy Wedding Sarah & John" />
        </div>

        <div class="summary">
          <h2>Total</h2>

          <h1 id="price">$180</h1>

          <button class="cart-btn">Add To Cart</button>
        </div>
      </div>
    </section>
  </body>
</html>
